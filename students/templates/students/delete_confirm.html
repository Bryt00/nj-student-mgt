<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete {{ student.firstname }}? | School Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-main: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            color: #b91c1c;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 0.875rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 0.75rem;
            cursor: pointer;
            border: none;
        }

        .btn-confirm { background: #ef4444; color: white; }
        .btn-cancel { background: white; color: var(--text-muted); border: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>Are you sure?</h1>
        <p>You are about to permanently delete the profile of <strong>{{ student.firstname }} {{ student.surname }}</strong>. This action cannot be undone.</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-confirm">Yes, Delete Student</button>
        </form>
        <a href="{% url 'student_detail' student.pk %}" class="btn btn-cancel">Cancel and Go Back</a>
    </div>
</body>
</html>
