<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Data | School Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 3rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            text-align: center;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 1rem;
            padding: 2.5rem;
            margin: 2rem 0;
            background: #f8fafc;
            transition: all 0.2s;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #f1f5f9;
        }

        .icon { font-size: 2.5rem; margin-bottom: 1rem; }

        input[type="file"] {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background: #4f46e5; }

        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Bulk Student Upload</h1>
            <p style="color: var(--text-muted); font-size: 0.875rem;">Import your student directory from an Excel file.</p>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="drop-zone">
                    <div class="icon">📁</div>
                    {{ form.excel_file.label_tag }}<br><br>
                    {{ form.excel_file }}
                </div>
                <button type="submit" class="btn">Start Import Process</button>
            </form>

            <a href="{% url 'dashboard' %}" class="back-link">← Return to Dashboard</a>
        </div>
    </div>
</body>
</html>
